<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Zero Trust</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a1a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .register-card { background: #1a1a2e; border-radius: 15px; padding: 40px; width: 400px; border: 1px solid #00d4ff33; }
        .register-card h1 { color: #00d4ff; text-align: center; margin-bottom: 10px; font-size: 22px; }
        .register-card p { color: #888; text-align: center; margin-bottom: 30px; font-size: 13px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #00d4ff; font-size: 13px; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; background: #0a0a1a; border: 1px solid #00d4ff55; border-radius: 8px; color: white; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #00d4ff; }
        .btn { width: 100%; padding: 14px; background: #00d4ff; color: #0a0a1a; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #0099bb; }
        .flash { background: #ff444433; border: 1px solid #ff4444; padding: 10px; border-radius: 8px; margin-bottom: 20px; color: #ff4444; text-align: center; font-size: 13px; }
        .login-link { text-align: center; margin-top: 20px; color: #888; font-size: 13px; }
        .login-link a { color: #00d4ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-card">
        <h1>🛡️ Zero Trust</h1>
        <p>Create Your Account</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>👤 Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" name="email" placeholder="Enter email" required>
            </div>
            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn">✅ Register</button>
        </form>
        <div class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</body>
</html>
